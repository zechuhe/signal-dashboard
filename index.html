<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Dashboard — 消息面×股價關聯分析</title>
<script src="https://cdn.jsdelivr.net/npm/klinecharts@9.8.12/dist/umd/klinecharts.min.js"></script>
<style>
:root {
  --bg: #1B1B1F;
  --panel-bg: #232328;
  --grid-line: #2A2A2E;
  --up-color: #F04848;
  --down-color: #00B07C;
  --text-primary: #E8E8E8;
  --text-secondary: #888888;
  --accent: #3B82F6;
  --border: #333338;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden; height: 100vh; display: flex; flex-direction: column;
}

/* ===== Header ===== */
.header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header .logo {
  font-size: 14px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

/* ===== Search Box ===== */
.search-wrapper {
  position: relative; flex: 1; max-width: 360px;
}
.search-input {
  width: 100%; padding: 6px 12px 6px 32px; font-size: 13px;
  background: var(--bg); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 6px;
  outline: none; transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-secondary); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-secondary); font-size: 13px; pointer-events: none;
}
.search-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--panel-bg); border: 1px solid var(--border);
  border-radius: 0 0 6px 6px; max-height: 300px; overflow-y: auto;
  z-index: 50; display: none;
}
.search-dropdown.open { display: block; }
.search-item {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--grid-line);
}
.search-item:hover { background: rgba(59,130,246,0.1); }
.search-item .code { font-weight: 600; }
.search-item .name { color: var(--text-secondary); font-size: 12px; }
.search-item .market-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(59,130,246,0.15); color: var(--accent);
}

/* ===== Action Buttons ===== */
.header-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.btn {
  padding: 5px 12px; font-size: 12px; border-radius: 4px;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); transition: all 0.15s;
}
.btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #2563eb; }

/* ===== Stock Tabs ===== */
.stock-tabs {
  display: flex; gap: 0; background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; flex-shrink: 0;
}
.stock-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; font-size: 12px;
  color: var(--text-secondary); cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all 0.15s; user-select: none;
}
.stock-tab:hover { color: var(--text-primary); }
.stock-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.stock-tab .tab-price { margin-left: 4px; }
.stock-tab .tab-close {
  margin-left: 4px; font-size: 14px; color: var(--text-secondary);
  opacity: 0; transition: opacity 0.1s;
}
.stock-tab:hover .tab-close { opacity: 1; }
.stock-tab .tab-close:hover { color: var(--up-color); }
.tab-price-up { color: var(--up-color); }
.tab-price-down { color: var(--down-color); }

/* ===== Stock Info Bar ===== */
.stock-info-bar {
  display: flex; align-items: baseline; gap: 16px;
  padding: 6px 16px; flex-shrink: 0; flex-wrap: wrap;
}
.si-name { font-size: 16px; font-weight: 700; }
.si-code { font-size: 12px; color: var(--text-secondary); }
.si-price { font-size: 20px; font-weight: 700; }
.si-change { font-size: 13px; }
.si-meta { font-size: 11px; color: var(--text-secondary); }

/* ===== Category Filter ===== */
.filter-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 16px; flex-shrink: 0; flex-wrap: wrap;
}
.filter-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-secondary);
  cursor: pointer; user-select: none;
}
.filter-item.off { opacity: 0.3; }
.filter-item input { accent-color: var(--accent); cursor: pointer; }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; }
.time-btns { display: flex; gap: 2px; margin-left: auto; }
.time-btn {
  padding: 2px 8px; font-size: 11px; border-radius: 3px;
  background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border); cursor: pointer;
}
.time-btn:hover { color: var(--text-primary); }
.time-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== Chart ===== */
#chart-area { flex: 1; min-height: 0; }

/* ===== Event List (bottom panel) ===== */
.event-list-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 16px; flex-shrink: 0;
  border-top: 1px solid var(--border); background: var(--panel-bg);
}
.event-list-panel {
  max-height: 0; overflow: hidden; transition: max-height 0.3s;
  background: var(--panel-bg); flex-shrink: 0;
}
.event-list-panel.open { max-height: 220px; overflow-y: auto; }
.evt-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.evt-table th {
  position: sticky; top: 0; background: var(--panel-bg);
  text-align: left; padding: 4px 10px; color: var(--text-secondary);
  border-bottom: 1px solid var(--border); font-weight: 500;
}
.evt-table td { padding: 4px 10px; border-bottom: 1px solid var(--grid-line); }
.evt-table tr:hover { background: rgba(59,130,246,0.05); }
.evt-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.btn-xs {
  padding: 1px 6px; font-size: 10px; border-radius: 3px;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary);
}
.btn-xs:hover { color: var(--text-primary); }

/* ===== Event Search ===== */
.evt-search {
  padding: 2px 8px; font-size: 11px; background: var(--bg);
  color: var(--text-primary); border: 1px solid var(--border);
  border-radius: 3px; outline: none; width: 160px;
}
.evt-search:focus { border-color: var(--accent); }

/* ===== Side Panel (Event Detail) ===== */
.side-panel {
  position: fixed; right: -420px; top: 0; bottom: 0;
  width: 400px; background: var(--panel-bg);
  border-left: 1px solid var(--border);
  z-index: 100; transition: right 0.3s; overflow-y: auto;
}
.side-panel.open { right: 0; }
.sp-header {
  position: sticky; top: 0; display: flex; align-items: center;
  justify-content: space-between; padding: 14px 16px;
  background: var(--panel-bg); border-bottom: 1px solid var(--border);
}
.sp-header h3 { font-size: 14px; }
.sp-close {
  width: 26px; height: 26px; display: flex; align-items: center;
  justify-content: center; background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-secondary); cursor: pointer; font-size: 15px;
}
.sp-close:hover { color: var(--text-primary); }
.sp-body { padding: 14px 16px; }
.sp-field { margin-bottom: 10px; }
.sp-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.sp-value { font-size: 13px; line-height: 1.5; }
.sp-tag {
  display: inline-block; padding: 1px 7px; margin: 2px 3px 2px 0;
  font-size: 10px; border-radius: 3px;
  background: rgba(59,130,246,0.12); color: var(--accent);
}
.sp-link { color: var(--accent); text-decoration: none; word-break: break-all; }
.sp-link:hover { text-decoration: underline; }
.sp-impact {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 11px; font-weight: 600;
}

/* ===== Modal (Add/Edit Event) ===== */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--panel-bg); border-radius: 8px;
  width: 460px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; border: 1px solid var(--border);
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.modal-hdr h3 { font-size: 14px; }
.modal-body { padding: 14px 16px; }
.modal-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 10px 16px; border-top: 1px solid var(--border);
}
.fg { margin-bottom: 12px; }
.fg-label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.fg-label .req { color: var(--up-color); }
.fg-input, .fg-select, .fg-textarea {
  width: 100%; padding: 6px 10px; font-size: 12px;
  background: var(--bg); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 4px; outline: none;
}
.fg-input:focus, .fg-select:focus, .fg-textarea:focus { border-color: var(--accent); }
.fg-textarea { resize: vertical; min-height: 50px; }
.fg-row { display: flex; gap: 10px; }
.fg-row > .fg { flex: 1; }
.fg-check { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.fg-check input { accent-color: var(--accent); }
.slider-row { display: flex; align-items: center; gap: 6px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
.slider-val { min-width: 32px; text-align: center; font-size: 12px; color: var(--accent); font-weight: 600; }

/* ===== Overlay ===== */
.overlay-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay-bg.open { opacity: 1; pointer-events: all; }

/* ===== Admin Panel ===== */
.admin-panel {
  position: fixed; left: -520px; top: 0; bottom: 0;
  width: 500px; background: var(--panel-bg);
  border-right: 1px solid var(--border);
  z-index: 100; transition: left 0.3s; overflow-y: auto;
  display: flex; flex-direction: column;
}
.admin-panel.open { left: 0; }
.admin-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.admin-header h3 { font-size: 14px; }
.admin-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.admin-tab {
  padding: 8px 14px; font-size: 12px; cursor: pointer;
  color: var(--text-secondary); border-bottom: 2px solid transparent;
}
.admin-tab:hover { color: var(--text-primary); }
.admin-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.admin-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
.admin-section { margin-bottom: 16px; }
.admin-section h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.log-entry {
  padding: 6px 0; border-bottom: 1px solid var(--grid-line);
  font-size: 11px; display: flex; gap: 8px;
}
.log-action {
  padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;
}
.log-create { background: rgba(0,176,124,0.15); color: #00B07C; }
.log-edit { background: rgba(59,130,246,0.15); color: var(--accent); }
.log-delete { background: rgba(240,72,72,0.15); color: #F04848; }
.log-time { color: var(--text-secondary); white-space: nowrap; }
.log-detail { color: var(--text-primary); }
.admin-evt-list { width: 100%; }
.admin-evt-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--grid-line);
  font-size: 12px;
}
.admin-evt-row .evt-date { width: 80px; flex-shrink: 0; color: var(--text-secondary); }
.admin-evt-row .evt-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.admin-evt-row .evt-src {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(136,136,136,0.15); color: var(--text-secondary);
}
.admin-evt-actions { display: flex; gap: 4px; flex-shrink: 0; }
.config-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--grid-line);
  font-size: 12px;
}
.config-item .cfg-name { color: var(--text-primary); }
.config-item .cfg-status { font-size: 11px; }
.cfg-on { color: #00B07C; }
.cfg-off { color: #F04848; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .side-panel { width: 100%; right: -100%; }
  .search-wrapper { max-width: 200px; }
  .header-actions .btn span { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">Signal Dashboard</span>
  <div class="search-wrapper">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="searchInput" placeholder="輸入股票代碼或名稱..." autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddForm()">+ 私人消息</button>
    <button class="btn" onclick="exportAll()">匯出</button>
    <label class="btn" style="cursor:pointer">載入事件<input type="file" accept=".json" style="display:none" onchange="importEvents(this)"></label>
    <button class="btn" onclick="loadDemo()">Demo</button>
    <button class="btn" onclick="toggleAdmin()" title="管理面板" style="font-size:14px;padding:3px 8px;">&#9881;</button>
  </div>
</div>

<!-- Stock Tabs -->
<div class="stock-tabs" id="stockTabs">
  <div style="padding:7px 14px;font-size:12px;color:var(--text-secondary)">搜尋股票以開始...</div>
</div>

<!-- Stock Info -->
<div class="stock-info-bar" id="stockInfoBar"></div>

<!-- Filter + Time Range -->
<div class="filter-bar" id="filterBar"></div>

<!-- Chart -->
<div id="chart-area"></div>

<!-- Event List -->
<div class="event-list-toggle">
  <button class="btn" onclick="toggleEvtList()" id="evtListBtn" style="font-size:11px;padding:3px 10px;">事件列表</button>
  <input class="evt-search" id="evtSearch" placeholder="搜尋事件..." oninput="filterEventList()">
  <span style="font-size:11px;color:var(--text-secondary);margin-left:auto;" id="evtCount"></span>
</div>
<div class="event-list-panel" id="evtListPanel">
  <table class="evt-table"><thead><tr>
    <th>日期</th><th>分類</th><th>標題</th><th>影響</th><th>信心</th><th>來源</th><th>操作</th>
  </tr></thead><tbody id="evtListBody"></tbody></table>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h3>管理面板</h3>
    <button class="sp-close" onclick="toggleAdmin()">&times;</button>
  </div>
  <div class="admin-tabs">
    <div class="admin-tab active" onclick="switchAdminTab('events',this)">事件管理</div>
    <div class="admin-tab" onclick="switchAdminTab('log',this)">操作日誌</div>
    <div class="admin-tab" onclick="switchAdminTab('config',this)">數據源</div>
  </div>
  <div class="admin-body" id="adminBody"></div>
</div>

<!-- Overlay -->
<div class="overlay-bg" id="overlayBg" onclick="closeSidePanel();document.getElementById('adminPanel').classList.remove('open')"></div>

<!-- Side Panel (Event Detail) -->
<div class="side-panel" id="sidePanel">
  <div class="sp-header">
    <h3 id="spTitle">事件詳情</h3>
    <button class="sp-close" onclick="closeSidePanel()">&times;</button>
  </div>
  <div class="sp-body" id="spBody"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">新增私人消息</h3>
      <button class="sp-close" onclick="closeAddForm()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fg-label">關聯股票 <span class="req">*</span></label>
        <select class="fg-select" id="fmStock"><option value="">— 請選擇 —</option></select>
      </div>
      <div class="fg">
        <label class="fg-label">事件標題 <span class="req">*</span>（30字內）</label>
        <input class="fg-input" id="fmTitle" maxlength="30" placeholder="例：XX公司OO項目主管離職">
      </div>
      <div class="fg">
        <label class="fg-label">事件描述 <span class="req">*</span></label>
        <textarea class="fg-textarea" id="fmDesc" placeholder="詳細描述..."></textarea>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="fg-label">消息取得日期 <span class="req">*</span></label>
          <input class="fg-input" type="date" id="fmDateRcv">
        </div>
        <div class="fg">
          <label class="fg-label">推測事件發生日期</label>
          <input class="fg-input" type="date" id="fmDateEvt">
          <div class="fg-check">
            <input type="checkbox" id="fmDateUnk" onchange="document.getElementById('fmDateEvt').disabled=this.checked">
            <label for="fmDateUnk">無法推測</label>
          </div>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="fg-label">預期影響 <span class="req">*</span></label>
          <select class="fg-select" id="fmImpact">
            <option value="negative">利空</option>
            <option value="positive">利好</option>
            <option value="neutral">不確定</option>
          </select>
        </div>
        <div class="fg">
          <label class="fg-label">來源層級</label>
          <select class="fg-select" id="fmSrcLvl">
            <option value="">— 選填 —</option>
            <option value="board">董事會</option>
            <option value="c_suite">高管</option>
            <option value="vp">VP/總監</option>
            <option value="manager">中層</option>
            <option value="industry">業界</option>
            <option value="internet">網路</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fg-label">信心度 <span class="req">*</span></label>
        <div class="slider-row">
          <input type="range" id="fmConf" min="0" max="100" value="50" oninput="document.getElementById('fmConfV').textContent=this.value+'%'">
          <span class="slider-val" id="fmConfV">50%</span>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeAddForm()">取消</button>
      <button class="btn btn-primary" onclick="submitEvent()">確認</button>
    </div>
  </div>
</div>

<script>
// ===== Constants =====
const CATEGORIES = {
  insider_private: { label: '私人消息', color: '#FF6B6B' },
  public_corporate: { label: '企業公告', color: '#4ECDC4' },
  public_macro: { label: '宏觀事件', color: '#FFD93D' },
  public_policy: { label: '政策法規', color: '#6C5CE7' },
  public_legal: { label: '法律訴訟', color: '#FF9500' }
};
const LS_EVENTS = 'sd_user_events';
const LS_LOG = 'sd_edit_log';

// ===== State =====
let chart = null;
let openStocks = [];      // [{symbol, name, exchange, priceData, events}]
let activeTabIdx = -1;
let activeCategories = new Set(Object.keys(CATEGORIES));
let editingId = null;
let stockList = [];        // [{code, name, exchange, yahooSuffix}]

// ===== Init =====
async function init() {
  // Register overlay
  registerSignalOverlay();

  // Init chart
  chart = klinecharts.init('chart-area', { styles: 'dark' });

  // Custom styles
  chart.setStyles({
    candle: {
      bar: {
        upColor: '#F04848', downColor: '#00B07C', noChangeColor: '#76808F',
        upBorderColor: '#F04848', downBorderColor: '#00B07C',
        upWickColor: '#F04848', downWickColor: '#00B07C'
      },
      tooltip: { showRule: 'always', showType: 'standard' }
    },
    indicator: {
      tooltip: { showRule: 'always' }
    },
    crosshair: {
      horizontal: { line: { color: '#555', style: 'dash' }, text: { backgroundColor: '#373a40' } },
      vertical: { line: { color: '#555', style: 'dash' }, text: { backgroundColor: '#373a40' } }
    }
  });

  // Add MA + Volume
  chart.createIndicator('MA', false, { id: 'candle_pane' });
  chart.overrideIndicator({ name: 'MA', calcParams: [5, 10, 20, 60] }, 'candle_pane');
  chart.createIndicator('VOL', false, { height: 80 });

  // Build filter bar
  buildFilterBar();

  // Setup search
  setupSearch();

  // Load stock list
  await loadStockList();
}

// ===== Signal Marker Overlay =====
function registerSignalOverlay() {
  klinecharts.registerOverlay({
    name: 'signalMarker',
    totalStep: 2,
    needDefaultPointFigure: false,
    needDefaultXAxisFigure: false,
    needDefaultYAxisFigure: false,
    createPointFigures: function(params) {
      var overlay = params.overlay;
      var coord = params.coordinates[0];
      if (!coord) return [];
      var data = overlay.extendData || {};
      var isUp = data.impact === 'positive';
      var isDown = data.impact === 'negative';
      var symbol = isUp ? '\u25B2' : isDown ? '\u25BC' : '\u25C6';
      var color = data.color || (isUp ? '#F04848' : isDown ? '#00B07C' : '#888');
      var yOff = isUp ? 18 : isDown ? -18 : 0;
      return [{
        type: 'text',
        attrs: { x: coord.x, y: coord.y + yOff, text: symbol, align: 'center', baseline: 'middle' },
        styles: { color: color, size: 14, family: 'Arial' }
      }];
    }
  });
}

// ===== Search =====
function setupSearch() {
  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('searchDropdown');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 1) { dropdown.classList.remove('open'); return; }

    const results = stockList.filter(s =>
      s.code.toLowerCase().startsWith(q) ||
      s.name.toLowerCase().includes(q)
    ).slice(0, 15);

    if (!results.length) {
      dropdown.innerHTML = '<div class="search-item" style="color:var(--text-secondary)">無結果</div>';
    } else {
      dropdown.innerHTML = results.map(s =>
        `<div class="search-item" onclick="openStock('${s.exchange}','${s.code}','${s.name.replace(/'/g,"\\'")}')">
          <span><span class="code">${s.code}</span> <span class="name">${s.name}</span></span>
          <span class="market-tag">${s.exchange}</span>
        </div>`
      ).join('');
    }
    dropdown.classList.add('open');
  });

  input.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('open'), 200));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
  });
}

// ===== Open Stock (new tab) =====
async function openStock(exchange, code, name) {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchDropdown').classList.remove('open');

  const symbol = `${exchange}:${code}`;

  // Check if already open
  const existing = openStocks.findIndex(s => s.symbol === symbol);
  if (existing >= 0) { switchTab(existing); return; }

  // Try to load price data
  let priceData = null;
  const fname = `data/price_${exchange}_${code}.json`;
  try {
    const resp = await fetch(fname);
    if (resp.ok) {
      const json = await resp.json();
      priceData = json.data || [];
    }
  } catch (e) {}

  if (!priceData || !priceData.length) {
    alert(`找不到 ${symbol} 的股價數據。\n請先用 fetch_prices.py 拉取或上傳對應 JSON。`);
    return;
  }

  // Add to open stocks
  openStocks.push({ symbol, name, exchange, code, priceData, events: [] });
  switchTab(openStocks.length - 1);
  buildTabs();
}

// ===== Tab Management =====
function buildTabs() {
  const el = document.getElementById('stockTabs');
  if (!openStocks.length) {
    el.innerHTML = '<div style="padding:7px 14px;font-size:12px;color:var(--text-secondary)">搜尋股票以開始...</div>';
    return;
  }
  el.innerHTML = openStocks.map((s, i) => {
    const last = s.priceData[s.priceData.length - 1];
    const cls = i === activeTabIdx ? 'active' : '';
    const priceCls = last && last.change >= 0 ? 'tab-price-up' : 'tab-price-down';
    return `<div class="stock-tab ${cls}" onclick="switchTab(${i})">
      <span>${s.code}</span>
      <span class="tab-price ${priceCls}">${last ? last.close.toFixed(2) : ''}</span>
      <span class="tab-close" onclick="event.stopPropagation();closeTab(${i})">&times;</span>
    </div>`;
  }).join('');
}

function switchTab(idx) {
  activeTabIdx = idx;
  const stock = openStocks[idx];
  buildTabs();
  updateStockInfo(stock);
  renderChart(stock);
  buildEventList(stock);
}

function closeTab(idx) {
  openStocks.splice(idx, 1);
  if (activeTabIdx >= openStocks.length) activeTabIdx = openStocks.length - 1;
  if (openStocks.length) switchTab(activeTabIdx);
  else {
    activeTabIdx = -1;
    buildTabs();
    document.getElementById('stockInfoBar').innerHTML = '';
    chart.applyNewData([]);
  }
}

// ===== Stock Info Bar =====
function updateStockInfo(stock) {
  const last = stock.priceData[stock.priceData.length - 1];
  if (!last) return;
  const up = last.change >= 0;
  const cls = up ? 'tab-price-up' : 'tab-price-down';
  const sign = up ? '+' : '';
  document.getElementById('stockInfoBar').innerHTML = `
    <span class="si-name">${stock.name}</span>
    <span class="si-code">${stock.symbol}</span>
    <span class="si-price ${cls}">${last.close.toFixed(2)}</span>
    <span class="si-change ${cls}">${sign}${last.change.toFixed(2)} (${sign}${last.change_pct}%)</span>
    <span class="si-meta">${last.date}</span>
  `;
}

// ===== Filter Bar =====
function buildFilterBar() {
  const el = document.getElementById('filterBar');
  const cats = Object.entries(CATEGORIES).map(([k, v]) =>
    `<label class="filter-item" data-cat="${k}">
      <input type="checkbox" checked onchange="toggleCat('${k}',this.checked)">
      <span class="filter-dot" style="background:${v.color}"></span>${v.label}
    </label>`
  ).join('');

  const timeBtns = ['3M','6M','1Y','3Y','全部'].map((l, i) =>
    `<button class="time-btn ${l==='全部'?'active':''}" onclick="setTimeRange('${l}',this)">${l}</button>`
  ).join('');

  el.innerHTML = cats + `<div class="time-btns">${timeBtns}</div>`;
}

function toggleCat(cat, on) {
  if (on) activeCategories.add(cat); else activeCategories.delete(cat);
  document.querySelector(`.filter-item[data-cat="${cat}"]`).classList.toggle('off', !on);
  if (activeTabIdx >= 0) renderChart(openStocks[activeTabIdx]);
}

function setTimeRange(label, btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (activeTabIdx < 0) return;
  const total = openStocks[activeTabIdx].priceData.length;
  const map = { '3M': 63, '6M': 126, '1Y': 252, '3Y': 756, '全部': total };
  const days = map[label] || total;
  const from = Math.max(0, total - days);
  chart.scrollByDistance(from > 0 ? -99999 : 99999, 300);
}

// ===== Render Chart =====
function renderChart(stock) {
  // Convert data to KLineChart format
  const kData = stock.priceData.map(d => ({
    timestamp: new Date(d.date).getTime(),
    open: d.open, high: d.high, low: d.low, close: d.close,
    volume: d.volume || 0
  }));

  chart.applyNewData(kData);

  // Remove old overlays
  chart.removeOverlay();

  // Add event markers
  const events = getMergedEvents(stock);
  events.filter(e => activeCategories.has(e.category)).forEach(evt => {
    const ts = new Date(evt.date).getTime();
    // Find nearest candle
    const candle = stock.priceData.find(d => d.date >= evt.date) || stock.priceData[stock.priceData.length - 1];
    if (!candle) return;

    const catInfo = CATEGORIES[evt.category] || { color: '#FF9500' };
    const isUp = evt.expected_impact === 'positive';
    const val = isUp ? candle.low * 0.99 : candle.high * 1.01;

    chart.createOverlay({
      name: 'signalMarker',
      points: [{ timestamp: new Date(candle.date).getTime(), value: val }],
      extendData: { impact: evt.expected_impact, color: catInfo.color, event: evt },
      onClicked: () => openSidePanel(evt)
    });
  });
}

// ===== Events =====
function getUserEvents() {
  try { return JSON.parse(localStorage.getItem(LS_EVENTS) || '[]'); } catch { return []; }
}
function saveUserEvents(evts) { localStorage.setItem(LS_EVENTS, JSON.stringify(evts)); }
function getLog() { try { return JSON.parse(localStorage.getItem(LS_LOG) || '[]'); } catch { return []; } }
function addLog(action, id, changes) {
  const log = getLog();
  log.push({ action, event_id: id, timestamp: new Date().toISOString(), changes });
  localStorage.setItem(LS_LOG, JSON.stringify(log));
}

function getMergedEvents(stock) {
  const user = getUserEvents().filter(e => (e.related_stocks || []).includes(stock.symbol));
  // TODO: also merge imported events and auto-fetched events
  return [...(stock.events || []), ...user];
}

  document.getElementById('evtListBtn').textContent = p.classList.contains('open') ? '收起' : '事件列表';

function buildEventList(stock) {
  const events = getMergedEvents(stock);

    return;
  }
  const sorted = [...events].sort((a, b) => b.date.localeCompare(a.date));
  tbody.innerHTML = sorted.map(evt => {
    const cat = CATEGORIES[evt.category] || { label: evt.category, color: '#888' };
    const impLabel = evt.expected_impact === 'negative' ? '利空' : evt.expected_impact === 'positive' ? '利好' : '中性';
    const impColor = evt.expected_impact === 'negative' ? 'var(--up-color)' : evt.expected_impact === 'positive' ? 'var(--down-color)' : 'var(--text-secondary)';
    const isUser = (evt.event_id || '').startsWith('user_');
    const actions = isUser
      ? `<button class="btn-xs" onclick="editEvent('${evt.event_id}')">編輯</button> <button class="btn-xs" onclick="deleteEvent('${evt.event_id}')">刪除</button>`
      : `<span style="font-size:10px;color:var(--text-secondary)">${evt.source_type||'demo'}</span>`;
    return `<tr onclick="openSidePanel(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(evt))}')))" style="cursor:pointer">
      <td style="white-space:nowrap">${evt.date}</td>
      <td><span class="evt-dot" style="background:${cat.color}"></span>${cat.label}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${evt.title}">${evt.title}</td>
      <td style="color:${impColor}">${impLabel}</td>
      <td>${Math.round((evt.confidence||0)*100)}%</td>
      <td>${evt.source_type||''}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">${actions}</td>

  }).join('');
}

// ===== Add/Edit/Delete Events =====
function openAddForm() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增私人消息';
  const sel = document.getElementById('fmStock');
  sel.innerHTML = '<option value="">— 請選擇 —</option>';

  });

  document.getElementById('fmDesc').value = '';

  document.getElementById('fmDateEvt').value = '';
  document.getElementById('fmDateEvt').disabled = false;
  document.getElementById('fmDateUnk').checked = false;
  document.getElementById('fmImpact').value = 'negative';
  document.getElementById('fmSrcLvl').value = '';
  document.getElementById('fmConf').value = 50;
  document.getElementById('fmConfV').textContent = '50%';
  document.getElementById('addModal').classList.add('open');
}

function closeAddForm() { document.getElementById('addModal').classList.remove('open'); }

function submitEvent() {
  const stock = document.getElementById('fmStock').value;
  const title = document.getElementById('fmTitle').value.trim();
  const desc = document.getElementById('fmDesc').value.trim();
  const dateRcv = document.getElementById('fmDateRcv').value;
  const dateEvt = document.getElementById('fmDateUnk').checked ? null : document.getElementById('fmDateEvt').value;
  const impact = document.getElementById('fmImpact').value;
  const conf = parseInt(document.getElementById('fmConf').value) / 100;
  const srcLvl = document.getElementById('fmSrcLvl').value;

  if (!stock) return alert('請選擇關聯股票');
  if (!title) return alert('請輸入事件標題');
  if (!desc) return alert('請輸入事件描述');
  if (!dateRcv) return alert('請選擇消息取得日期');

  const events = getUserEvents();
  if (editingId) {
    const idx = events.findIndex(e => e.event_id === editingId);
    if (idx < 0) return;
    events[idx] = { ...events[idx], date: dateEvt || dateRcv, date_received: dateRcv, date_event_estimated: dateEvt, title, description: desc, related_stocks: [stock], expected_impact: impact, confidence: conf, metadata: { ...events[idx].metadata, source_level: srcLvl, last_edited: new Date().toISOString() } };
    addLog('edit', editingId, { title });
    editingId = null;
  } else {
    const evt = { event_id: 'user_' + Date.now(), date: dateEvt || dateRcv, date_received: dateRcv, date_event_estimated: dateEvt, title, description: desc, category: 'insider_private', source_type: 'private', source_url: '', related_stocks: [stock], expected_impact: impact, confidence: conf, tags: ['user_input'], metadata: { source_level: srcLvl, created_at: new Date().toISOString() } };
    events.push(evt);
    addLog('create', evt.event_id, { title });
  }
  saveUserEvents(events);
  closeAddForm();
  if (activeTabIdx >= 0) { renderChart(openStocks[activeTabIdx]); buildEventList(openStocks[activeTabIdx]); }
}

function editEvent(id) {
  const events = getUserEvents();
  const evt = events.find(e => e.event_id === id);
  if (!evt) return;
  editingId = id;
  openAddForm();
  document.getElementById('modalTitle').textContent = '編輯私人消息';
  document.getElementById('fmStock').value = (evt.related_stocks||[])[0] || '';
  document.getElementById('fmTitle').value = evt.title;
  document.getElementById('fmDesc').value = evt.description;
  document.getElementById('fmDateRcv').value = evt.date_received || evt.date;
  document.getElementById('fmDateEvt').value = evt.date_event_estimated || '';
  document.getElementById('fmDateUnk').checked = !evt.date_event_estimated;
  document.getElementById('fmDateEvt').disabled = !evt.date_event_estimated;
  document.getElementById('fmImpact').value = evt.expected_impact;
  document.getElementById('fmSrcLvl').value = (evt.metadata && evt.metadata.source_level) || '';
  document.getElementById('fmConf').value = Math.round(evt.confidence * 100);
  document.getElementById('fmConfV').textContent = Math.round(evt.confidence * 100) + '%';
}

function deleteEvent(id) {
  if (!confirm('確定刪除？')) return;
  let events = getUserEvents();
  const del = events.find(e => e.event_id === id);
  events = events.filter(e => e.event_id !== id);
  saveUserEvents(events);
  addLog('delete', id, del ? { title: del.title } : {});
  if (activeTabIdx >= 0) { renderChart(openStocks[activeTabIdx]); buildEventList(openStocks[activeTabIdx]); }
}

// ===== Import / Export =====
function importEvents(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let events = [];
      if (Array.isArray(data)) events = data;
      else if (data.events) events = data.events;
      else if (data.cases) data.cases.forEach(c => events.push(...(c.events || [])));

      // Merge into current tab's events
      if (activeTabIdx >= 0) {
        openStocks[activeTabIdx].events = [...openStocks[activeTabIdx].events, ...events];
        renderChart(openStocks[activeTabIdx]);
        buildEventList(openStocks[activeTabIdx]);
      }
      alert(`已載入 ${events.length} 則事件`);
    } catch (err) { alert('解析失敗: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function exportAll() {
  const userEvents = getUserEvents();
  const log = getLog();
  const output = { exported_at: new Date().toISOString(), user_events: userEvents, edit_log: log };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `signal_dashboard_export_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

  overlay.classList.toggle('open', panel.classList.contains('open'));

  const body = document.getElementById('adminBody');
  if (tab === 'events') renderAdminEvents(body);
  else if (tab === 'log') renderAdminLog(body);
  else if (tab === 'config') renderAdminConfig(body);
}

function renderAdminEvents(body) {
  const userEvents = getUserEvents();
  // Also gather loaded events from open tabs
  let allEvts = [...userEvents];
  openStocks.forEach(s => { if (s.events) allEvts.push(...s.events); });

  // Deduplicate by event_id
  const seen = new Set();
  allEvts = allEvts.filter(e => { if (seen.has(e.event_id)) return false; seen.add(e.event_id); return true; });
  allEvts.sort((a, b) => b.date.localeCompare(a.date));

  if (!allEvts.length) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:30px;">暫無事件。使用「+ 私人消息」新增或「載入事件」匯入。</div>';
    return;
  }

  body.innerHTML = `<div class="admin-section"><h4>全部事件 (${allEvts.length})</h4></div>` +
    allEvts.map(evt => {
      const cat = CATEGORIES[evt.category] || { label: '?', color: '#888' };
      const isUser = (evt.event_id || '').startsWith('user_');
      const srcLabel = isUser ? '私人' : (evt.source_type || 'demo');
      const srcClass = isUser ? 'background:rgba(255,107,107,0.15);color:#FF6B6B' : '';
      return `<div class="admin-evt-row">
        <span class="evt-date">${evt.date}</span>
        <span class="evt-dot" style="background:${cat.color}"></span>
        <span class="evt-title" title="${evt.title}">${evt.title}</span>
        <span class="evt-src" style="${srcClass}">${srcLabel}</span>
        <div class="admin-evt-actions">
          ${isUser ? `<button class="btn-xs" onclick="editEvent('${evt.event_id}');toggleAdmin()">編輯</button><button class="btn-xs" onclick="deleteEvent('${evt.event_id}')">刪除</button>` : ''}
          <button class="btn-xs" onclick="openSidePanel(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(evt))}')));toggleAdmin()">詳情</button>
        </div>
      </div>`;
    }).join('');
}

function renderAdminLog(body) {
  const log = getLog();
  if (!log.length) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:30px;">暫無操作紀錄。</div>';
    return;
  }

  const sorted = [...log].reverse();
  body.innerHTML = `<div class="admin-section"><h4>操作日誌 (${sorted.length})</h4></div>` +
    sorted.map(l => {
      const actionCls = l.action === 'create' ? 'log-create' : l.action === 'edit' ? 'log-edit' : 'log-delete';
      const actionLabel = l.action === 'create' ? '新增' : l.action === 'edit' ? '編輯' : '刪除';
      const time = l.timestamp ? l.timestamp.slice(0, 19).replace('T', ' ') : '';
      const detail = l.changes ? (l.changes.title || l.changes.new_title || l.changes.old_title || '') : '';
      return `<div class="log-entry">
        <span class="log-action ${actionCls}">${actionLabel}</span>
        <span class="log-time">${time}</span>
        <span class="log-detail">${detail}</span>
      </div>`;
    }).join('') +
    `<div style="margin-top:12px;"><button class="btn" onclick="clearLog()">清除日誌</button></div>`;
}

function clearLog() {
  if (!confirm('確定清除所有操作日誌？')) return;
  localStorage.setItem(LS_LOG, '[]');
  renderAdminTab('log');
}

function renderAdminConfig(body) {
  const sources = [
    { name: 'HKEX News', desc: '港交所公告', key: 'hkex', status: true },
    { name: 'Google News', desc: '財經新聞 RSS', key: 'google_news', status: true },
    { name: 'Eastmoney', desc: '東方財富', key: 'eastmoney', status: true }
  ];

  body.innerHTML = `
    <div class="admin-section"><h4>數據來源狀態</h4></div>
    ${sources.map(s => `<div class="config-item">
      <div>
        <div class="cfg-name">${s.name}</div>
        <div style="font-size:10px;color:var(--text-secondary)">${s.desc}</div>
      </div>
      <span class="cfg-status ${s.status ? 'cfg-on' : 'cfg-off'}">${s.status ? '啟用' : '停用'}</span>
    </div>`).join('')}
    <div class="admin-section" style="margin-top:16px;"><h4>數據管理</h4></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" onclick="exportAll()">匯出全部數據</button>
      <button class="btn" onclick="clearUserEvents()">清除私人消息</button>
      <button class="btn" onclick="clearLog()">清除日誌</button>
    </div>
    <div class="admin-section" style="margin-top:16px;"><h4>使用說明</h4></div>
    <div style="font-size:11px;color:var(--text-secondary);line-height:1.6;">
      <p>1. 搜尋框輸入代碼或名稱 → 開 tab 查看 K 線圖</p>
      <p>2. 「+ 私人消息」新增事件 → 自動標記在圖表上</p>
      <p>3. 「載入事件」匯入 fetch_news.py 產出的 JSON</p>
      <p>4. 事件列表可搜尋/編輯/刪除</p>
      <p>5. ▲ 利多 / ▼ 利空 / ◆ 中性</p>
    </div>
  `;
}

function clearUserEvents() {
  if (!confirm('確定清除所有私人消息？此操作不可逆。')) return;
  localStorage.setItem(LS_EVENTS, '[]');
  if (activeTabIdx >= 0) { renderChart(openStocks[activeTabIdx]); buildEventList(openStocks[activeTabIdx]); }
  renderAdminTab('events');
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSidePanel(); closeAddForm(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// ===== Go =====
init().catch(err => console.error('Init failed:', err));
</script>
</body>
</html>
