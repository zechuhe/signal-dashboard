<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Dashboard — 消息面×股價關聯分析</title>
<script src="https://cdn.jsdelivr.net/npm/klinecharts@9.8.12/dist/umd/klinecharts.min.js"></script>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">Signal Dashboard</span>
  <div class="search-wrapper">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="searchInput" placeholder="輸入股票代碼或名稱..." autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddForm()">+ 私人消息</button>
    <button class="btn" onclick="exportAll()">匯出</button>
    <label class="btn" style="cursor:pointer">載入事件<input type="file" accept=".json" style="display:none" onchange="importEvents(this)"></label>
    <button class="btn" onclick="loadDemo()">Demo</button>
    <button class="btn" onclick="toggleAdmin()" title="管理面板" style="font-size:14px;padding:3px 8px;">&#9881;</button>
  </div>
</div>

<!-- Stock Tabs -->
<div class="stock-tabs" id="stockTabs">
  <div style="padding:7px 14px;font-size:12px;color:var(--text-secondary)">搜尋股票以開始...</div>
</div>

<!-- Stock Info -->
<div class="stock-info-bar" id="stockInfoBar"></div>

<!-- Filter + Time Range -->
<div class="filter-bar" id="filterBar"></div>

<!-- Chart -->
<div id="chart-area"></div>

<!-- Event List -->
<div class="event-list-toggle">
  <button class="btn" onclick="toggleEvtList()" id="evtListBtn" style="font-size:11px;padding:3px 10px;">事件列表</button>
  <input class="evt-search" id="evtSearch" placeholder="搜尋事件..." oninput="filterEventList()">
  <span style="font-size:11px;color:var(--text-secondary);margin-left:auto;" id="evtCount"></span>
</div>
<div class="event-list-panel" id="evtListPanel">
  <table class="evt-table"><thead><tr>
    <th>日期</th><th>分類</th><th>標題</th><th>影響</th><th>信心</th><th>來源</th><th>操作</th>
  </tr></thead><tbody id="evtListBody"></tbody></table>
</div>

<!-- Admin Panel -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h3>管理面板</h3>
    <button class="sp-close" onclick="toggleAdmin()">&times;</button>
  </div>
  <div class="admin-tabs">
    <div class="admin-tab active" onclick="switchAdminTab('events',this)">事件管理</div>
    <div class="admin-tab" onclick="switchAdminTab('log',this)">操作日誌</div>
    <div class="admin-tab" onclick="switchAdminTab('config',this)">數據源</div>
  </div>
  <div class="admin-body" id="adminBody"></div>
</div>

<!-- Overlay -->
<div class="overlay-bg" id="overlayBg" onclick="closeAllPanels()"></div>

<!-- Side Panel (Event Detail) -->
<div class="side-panel" id="sidePanel">
  <div class="sp-header">
    <h3 id="spTitle">事件詳情</h3>
    <button class="sp-close" onclick="closeSidePanel()">&times;</button>
  </div>
  <div class="sp-body" id="spBody"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">新增私人消息</h3>
      <button class="sp-close" onclick="closeAddForm()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fg-label">關聯股票 <span class="req">*</span></label>
        <select class="fg-select" id="fmStock"><option value="">— 請選擇 —</option></select>
      </div>
      <div class="fg">
        <label class="fg-label">事件標題 <span class="req">*</span>（30字內）</label>
        <input class="fg-input" id="fmTitle" maxlength="30" placeholder="例：XX公司OO項目主管離職">
      </div>
      <div class="fg">
        <label class="fg-label">事件描述 <span class="req">*</span></label>
        <textarea class="fg-textarea" id="fmDesc" placeholder="詳細描述..."></textarea>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="fg-label">消息取得日期 <span class="req">*</span></label>
          <input class="fg-input" type="date" id="fmDateRcv">
        </div>
        <div class="fg">
          <label class="fg-label">推測事件發生日期</label>
          <input class="fg-input" type="date" id="fmDateEvt">
          <div class="fg-check">
            <input type="checkbox" id="fmDateUnk" onchange="document.getElementById('fmDateEvt').disabled=this.checked">
            <label for="fmDateUnk">無法推測</label>
          </div>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="fg-label">預期影響 <span class="req">*</span></label>
          <select class="fg-select" id="fmImpact">
            <option value="negative">利空</option>
            <option value="positive">利好</option>
            <option value="neutral">不確定</option>
          </select>
        </div>
        <div class="fg">
          <label class="fg-label">來源層級</label>
          <select class="fg-select" id="fmSrcLvl">
            <option value="">— 選填 —</option>
            <option value="board">董事會</option>
            <option value="c_suite">高管</option>
            <option value="vp">VP/總監</option>
            <option value="manager">中層</option>
            <option value="industry">業界</option>
            <option value="internet">網路</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fg-label">信心度 <span class="req">*</span></label>
        <div class="slider-row">
          <input type="range" id="fmConf" min="0" max="100" value="50" oninput="document.getElementById('fmConfV').textContent=this.value+'%'">
          <span class="slider-val" id="fmConfV">50%</span>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeAddForm()">取消</button>
      <button class="btn btn-primary" onclick="submitEvent()">確認</button>
    </div>
  </div>
</div>

<!-- JS Modules (load order matters) -->
<script src="js/utils.js"></script>
<script src="js/chart.js"></script>
<script src="js/search.js"></script>
<script src="js/tabs.js"></script>
<script src="js/events.js"></script>
<script src="js/forms.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>
</body>
</html>
